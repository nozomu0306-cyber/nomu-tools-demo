<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Style Pro - 設定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/settings.css">
</head>
<body>
<div class="app">
  <header class="header">
    <h1 class="header-title">Chat Style Pro</h1>
    <p class="header-sub">チャットオーバーレイカスタマイザー</p>
  </header>

  <section class="url-section">
    <label class="url-label">OBS用URL</label>
    <div class="url-row">
      <input type="text" id="obs-url" class="url-input" readonly>
      <button id="btn-copy-url" class="btn btn-primary">URLをコピー</button>
    </div>
    <p id="copy-msg" class="copy-msg"></p>
  </section>

  <div class="main-layout">
    <div class="settings-panel">
      <div class="tabs">
        <button class="tab active" data-tab="theme">テーマ</button>
        <button class="tab" data-tab="text">テキスト</button>
        <button class="tab" data-tab="display">表示</button>
        <button class="tab" data-tab="color">カラー</button>
        <button class="tab" data-tab="save">保存</button>
      </div>

      <!-- テーマタブ -->
      <div class="tab-content active" id="tab-theme">
        <div class="field">
          <label>テーマ</label>
          <div class="theme-grid">
            <button class="theme-btn active" data-theme="neon">
              <div class="theme-preview-box" style="background:rgba(10,10,50,0.9);color:#00ccff;border:1px solid rgba(0,170,255,0.3);">Chat</div>
              <span>ネオン</span>
            </button>
            <button class="theme-btn" data-theme="gaming">
              <div class="theme-preview-box" style="background:rgba(20,0,40,0.9);color:#ff6ec7;border:1px solid rgba(255,110,199,0.3);">Chat</div>
              <span>ゲーミング</span>
            </button>
            <button class="theme-btn" data-theme="minimal">
              <div class="theme-preview-box" style="background:rgba(30,30,30,0.9);color:#fff;">Chat</div>
              <span>ミニマル</span>
            </button>
            <button class="theme-btn" data-theme="pastel">
              <div class="theme-preview-box" style="background:rgba(255,240,245,0.9);color:#9c27b0;border:1px solid rgba(206,147,216,0.3);">Chat</div>
              <span>パステル</span>
            </button>
            <button class="theme-btn" data-theme="retro">
              <div class="theme-preview-box" style="background:rgba(0,20,0,0.9);color:#00ff41;font-family:monospace;border:1px solid rgba(0,255,65,0.2);">Chat</div>
              <span>レトロ</span>
            </button>
            <button class="theme-btn" data-theme="bubble">
              <div class="theme-preview-box" style="background:linear-gradient(135deg,#6c5ce7,#00cec9);color:#fff;border-radius:12px;">Chat</div>
              <span>バブル</span>
            </button>
            <button class="theme-btn" data-theme="glass">
              <div class="theme-preview-box" style="background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.2);">Chat</div>
              <span>ガラス</span>
            </button>
          </div>
        </div>
        <div class="field">
          <label>アニメーション</label>
          <select id="opt-anim" class="select">
            <option value="default">フェードイン（下から）</option>
            <option value="slide">スライドイン（左から）</option>
            <option value="scale">スケールイン</option>
            <option value="bounce">バウンス</option>
          </select>
        </div>
      </div>

      <!-- テキストタブ -->
      <div class="tab-content" id="tab-text">
        <div class="field">
          <label>フォント</label>
          <select id="opt-font" class="select">
            <option value="Noto Sans JP">Noto Sans JP</option>
            <option value="M PLUS Rounded 1c">M PLUS Rounded 1c</option>
            <option value="Kosugi Maru">Kosugi Maru</option>
            <option value="DotGothic16">DotGothic16</option>
          </select>
        </div>
        <div class="field-row">
          <div class="field">
            <label>テキストサイズ</label>
            <input type="range" id="opt-fontSize" min="10" max="28" value="14" class="range">
            <span class="range-val" id="val-fontSize">14px</span>
          </div>
          <div class="field">
            <label>名前サイズ</label>
            <input type="range" id="opt-nameSize" min="10" max="24" value="13" class="range">
            <span class="range-val" id="val-nameSize">13px</span>
          </div>
        </div>
      </div>

      <!-- 表示タブ -->
      <div class="tab-content" id="tab-display">
        <div class="field">
          <label>最大表示数</label>
          <input type="range" id="opt-max" min="3" max="30" value="15" class="range">
          <span class="range-val" id="val-max">15</span>
        </div>
        <div class="field">
          <label>自動消去（秒、0=なし）</label>
          <input type="range" id="opt-fade" min="0" max="60" value="0" class="range">
          <span class="range-val" id="val-fade">0</span>
        </div>
        <div class="field">
          <label>メッセージ間隔</label>
          <input type="range" id="opt-gap" min="0" max="20" value="6" class="range">
          <span class="range-val" id="val-gap">6px</span>
        </div>
        <div class="field">
          <label>角丸</label>
          <input type="range" id="opt-radius" min="0" max="24" value="8" class="range">
          <span class="range-val" id="val-radius">8px</span>
        </div>
        <div class="field">
          <label class="checkbox-label">
            <input type="checkbox" id="opt-avatar" checked> アバターを表示
          </label>
        </div>
        <div class="field">
          <label class="checkbox-label">
            <input type="checkbox" id="opt-name" checked> 名前を表示
          </label>
        </div>
        <div class="field">
          <label>デモ速度（ミリ秒）</label>
          <input type="range" id="opt-demoSpeed" min="1000" max="8000" step="500" value="3000" class="range">
          <span class="range-val" id="val-demoSpeed">3000ms</span>
        </div>
      </div>

      <!-- カラータブ -->
      <div class="tab-content" id="tab-color">
        <p style="font-size:12px;color:var(--text-dim);margin-bottom:16px;">空欄の場合はテーマのデフォルト色が使われます</p>
        <div class="field-row">
          <div class="field">
            <label>名前色（カスタム）</label>
            <input type="color" id="opt-nameColor" value="#00ccff" class="color-input">
            <label class="checkbox-label" style="margin-top:4px;">
              <input type="checkbox" id="opt-nameColorOn"> 有効
            </label>
          </div>
          <div class="field">
            <label>テキスト色（カスタム）</label>
            <input type="color" id="opt-textColor" value="#ffffff" class="color-input">
            <label class="checkbox-label" style="margin-top:4px;">
              <input type="checkbox" id="opt-textColorOn"> 有効
            </label>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>背景色（カスタム）</label>
            <input type="color" id="opt-bgColor" value="#1a1a2e" class="color-input">
            <label class="checkbox-label" style="margin-top:4px;">
              <input type="checkbox" id="opt-bgColorOn"> 有効
            </label>
          </div>
          <div class="field">
            <label>背景透明度</label>
            <input type="range" id="opt-bgOpacity" min="0" max="1" step="0.05" value="0.85" class="range">
            <span class="range-val" id="val-bgOpacity">0.85</span>
          </div>
        </div>
      </div>

      <!-- 保存タブ -->
      <div class="tab-content" id="tab-save">
        <h3 class="section-title">プリセット</h3>
        <div class="preset-grid">
          <div class="preset-slot" data-slot="1">
            <button class="btn btn-sm btn-outline" data-action="save">保存1</button>
            <button class="btn btn-sm" data-action="load">読込1</button>
          </div>
          <div class="preset-slot" data-slot="2">
            <button class="btn btn-sm btn-outline" data-action="save">保存2</button>
            <button class="btn btn-sm" data-action="load">読込2</button>
          </div>
          <div class="preset-slot" data-slot="3">
            <button class="btn btn-sm btn-outline" data-action="save">保存3</button>
            <button class="btn btn-sm" data-action="load">読込3</button>
          </div>
        </div>
        <hr class="divider">
        <h3 class="section-title">エクスポート / インポート</h3>
        <div class="field-row">
          <button id="btn-export" class="btn btn-outline">エクスポート</button>
          <button id="btn-import" class="btn btn-outline">インポート</button>
          <input type="file" id="file-import" accept=".json" style="display:none">
        </div>
      </div>
    </div>

    <div class="preview-panel">
      <div class="preview-header">
        <span>プレビュー（デモモード）</span>
      </div>
      <div class="preview-wrapper">
        <iframe id="preview-frame" src="index.html?source=demo"></iframe>
      </div>
    </div>
  </div>
</div>

<script src="js/settings.js"></script>
</body>
</html>
